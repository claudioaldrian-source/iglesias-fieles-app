<script>
const supabase = window.supabase.createClient(
  "https://iilefvoxigwozzbzgdzb.supabase.co",

// cargar iglesias
async function cargarIglesias() {
  const { data } = await supabase.from("iglesias").select("*");

  const select = document.getElementById("iglesia");

  data.forEach(i => {
    const option = document.createElement("option");
    option.value = i.id;
    option.textContent = i.nombre;
    select.appendChild(option);
  });
}

// registrar fiel
async function registrar() {
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const iglesia_id = document.getElementById("iglesia").value;

  console.log("DATOS:", nombre, telefono, iglesia_id);

  const { data, error } = await supabase
    .from("fieles")
    .insert([{ nombre, telefono, iglesia_id }]);

  console.log("RESULT:", data, error);

  if (error) {
    alert("Error");
  } else {
    alert("Guardado");
  }
}

// pedir oración
async function pedirOracion() {
  const nombre = document.getElementById("nombre").value;
  const pedido = document.getElementById("pedido").value;
  const iglesia_id = document.getElementById("iglesia").value;

  await supabase.from("oraciones").insert([
    { nombre, pedido, iglesia_id }
  ]);

  alert("Oración enviada 🙏");
}
