<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iglesias MACLA-IA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0a0f2c, #000);
  color: white;
  text-align: center;
}

header {
  padding: 30px 20px;
}

h1 {
  color: gold;
}

.logo {
  width: 80px;
  margin: 10px auto;
}

.card {
  background: rgba(255,255,255,0.05);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

input, select {
  width: 90%;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: gold;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #e6c200;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="logo">
  <h1>Iglesias MACLA-IA</h1>
  <p>Conectando la fe con la tecnología</p>
</header>

<div class="card">
  <h2>📝 Registro Iglesia</h2>

  <input id="nombre" placeholder="Nombre">
  <input id="telefono" placeholder="Teléfono">

  <select id="iglesia">
    <option value="">Seleccionar iglesia</option>
  </select>

  <button onclick="registrar()">Registrarme</button>
</div>

<div class="card">
  <h2>🙏 Pedir oración</h2>

  <input id="pedido" placeholder="Escribe tu pedido">

  <button onclick="pedirOracion()">Enviar</button>
</div>

<div class="footer">
  MACLA-IA © 2026
</div>

<script>
const supabase = window.supabase.createClient(
  "https://iilefvoxigwozzbzgdzb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpbGVmdm94aWd3b3p6YnpnZHpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI2MzE4MTAsImV4cCI6MjA3ODIwNzgxMH0.NK5fR9dsYMlweLAICf4ZWIUVcusho1z3kW0AAfzXwqc"
);

// cargar iglesias
async function cargarIglesias() {
  const { data } = await supabase.from("iglesias").select("*");

  const select = document.getElementById("iglesia");

  data.forEach(i => {
    const option = document.createElement("option");
    option.value = i.id;
    option.textContent = i.nombre;
    select.appendChild(option);
  });
}

// registrar fiel
async function registrar() {
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const iglesia_id = document.getElementById("iglesia").value;

  const { error } = await supabase
    .from("fieles")
    .insert([{ nombre, telefono, iglesia_id }]);

  if (error) {
    alert("Error al registrar");
    console.log(error);
  } else {
    alert("Registrado correctamente ✅");
  }
}

// pedir oración
async function pedirOracion() {
  const nombre = document.getElementById("nombre").value;
  const pedido = document.getElementById("pedido").value;
  const iglesia_id = document.getElementById("iglesia").value;

  const { error } = await supabase.from("oraciones").insert([
    { nombre, pedido, iglesia_id }
  ]);

  if (error) {
    alert("Error al enviar");
  } else {
    alert("Oración enviada 🙏");
  }
}

cargarIglesias();
</script>

</body>
</html>
